<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cuenta – Strawberry Kiss</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <script src="api.js"></script>

  <style>
    :root { --sk-pink: #f35a7b; --sk-light: #fff0f4; }

    body {
      background: linear-gradient(135deg, #ffe6ec 0%, #e8f0e4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    .navbar-custom { background: var(--sk-pink) !important; }
    .navbar-custom .navbar-brand,
    .navbar-custom .nav-link { color: white !important; font-weight: 600; }
    .navbar-custom .nav-link:hover { opacity: .85; }

    /* CARD */
    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }
    .auth-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(243,90,123,.18);
      width: 100%;
      max-width: 450px;
      overflow: hidden;
      animation: slideUp .55s ease forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* TABS */
    .sk-tabs { display: flex; border-bottom: 2px solid #f9b8c7; }
    .sk-tab {
      flex: 1; padding: 1.1rem;
      background: #fdf3f6; color: #888;
      font-size: 1rem; font-weight: 700;
      text-align: center; cursor: pointer;
      border: none; transition: all .25s;
    }
    .sk-tab.active {
      background: var(--sk-pink); color: white;
    }
    .sk-tab:not(.active):hover { background: #fce4ec; color: var(--sk-pink); }

    .form-panel { display: none; padding: 2rem 2.2rem 2.2rem; }
    .form-panel.active { display: block; animation: fadeIn .35s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .form-panel h2 { color: var(--sk-pink); font-weight: 800; font-size: 1.7rem; text-align: center; margin-bottom: 1.4rem; }

    .form-floating label { color: #888; font-size: .9rem; }
    .form-control:focus { border-color: var(--sk-pink); box-shadow: 0 0 0 3px rgba(243,90,123,.15); }

    .btn-sk {
      background: var(--sk-pink); color: white; border: none;
      padding: .85rem; border-radius: 14px; font-size: 1.05rem;
      font-weight: 700; width: 100%; margin-top: .5rem;
      transition: all .25s;
    }
    .btn-sk:hover { background: #d94e6a; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(243,90,123,.35); }
    .btn-sk:disabled { background: #ccc; transform: none; box-shadow: none; }

    .msg-box {
      margin-top: 1rem; padding: .85rem 1rem;
      border-radius: 10px; font-size: .92rem;
      text-align: center; display: none;
    }
    .msg-box.success { background: #d4edda; color: #155724; }
    .msg-box.danger  { background: #f8d7da; color: #721c24; }

    /* brand logo top */
    .auth-logo {
      background: var(--sk-pink);
      text-align: center;
      padding: 1.8rem 1rem 1.4rem;
      color: white;
    }
    .auth-logo h1 { font-size: 2rem; font-weight: 900; letter-spacing: 1px; margin: 0; }
    .auth-logo p  { font-size: .85rem; opacity: .85; margin: .3rem 0 0; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">🍓 Strawberry Kiss</a>
    <div class="d-flex gap-2">
      <a href="infoOrdenaAqui.html" class="btn btn-outline-light btn-sm rounded-pill">
        <i class="bi bi-cart3"></i> Carrito
      </a>
      <a href="index.html" class="btn btn-light btn-sm rounded-pill" style="color:var(--sk-pink); font-weight:700;">
        <i class="bi bi-house"></i> Inicio
      </a>
    </div>
  </div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card" data-aos="zoom-in">

    <div class="auth-logo">
      <h1>🍓 Mi Cuenta</h1>
      <p>Inicia sesión o crea tu cuenta para ordenar</p>
    </div>

    <!-- TABS -->
    <div class="sk-tabs">
      <button class="sk-tab active" id="tab-login" onclick="showTab('login')">
        <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
      </button>
      <button class="sk-tab" id="tab-register" onclick="showTab('register')">
        <i class="bi bi-person-plus"></i> Crear Cuenta
      </button>
    </div>

    <!-- LOGIN -->
    <div id="panel-login" class="form-panel active">
      <h2>¡Bienvenido! 👋</h2>

      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="login-email" placeholder="correo@email.com">
        <label for="login-email"><i class="bi bi-envelope"></i> Correo electrónico</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="login-password" placeholder="••••••">
        <label for="login-password"><i class="bi bi-lock"></i> Contraseña</label>
      </div>

      <button class="btn-sk" id="btn-login" onclick="hacerLogin()">
        <i class="bi bi-box-arrow-in-right"></i> Entrar
      </button>
      <div class="msg-box" id="msg-login"></div>
    </div>

    <!-- REGISTRO -->
    <div id="panel-register" class="form-panel">
      <h2>Crear Cuenta 🍰</h2>

      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="reg-nombre" placeholder="Tu nombre">
        <label for="reg-nombre"><i class="bi bi-person"></i> Nombre completo</label>
      </div>
      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="reg-email" placeholder="correo@email.com">
        <label for="reg-email"><i class="bi bi-envelope"></i> Correo electrónico</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="reg-password" placeholder="Mínimo 6 caracteres">
        <label for="reg-password"><i class="bi bi-lock"></i> Contraseña</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="reg-confirm" placeholder="Repite tu contraseña">
        <label for="reg-confirm"><i class="bi bi-lock-fill"></i> Confirmar contraseña</label>
      </div>

      <button class="btn-sk" id="btn-registro" onclick="hacerRegistro()">
        <i class="bi bi-person-check"></i> Registrarme
      </button>
      <div class="msg-box" id="msg-registro"></div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({ duration: 600, once: true });

  // Si ya está logueado, redirigir
  if (typeof estaLogueado === 'function' && estaLogueado()) {
    window.location.href = 'index.html';
  }

  function showTab(tab) {
    ['login','register'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
      document.getElementById('panel-' + (t === 'login' ? 'login' : 'register')).classList.toggle('active', t === tab);
    });
    // fix panel ids
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg-box ' + type;
    el.style.display = 'block';
  }

  async function hacerLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showMsg('msg-login','Por favor completa todos los campos.','danger'); return; }

    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando…';

    const { ok, data } = await login(email, password);
    if (ok) {
      showMsg('msg-login', `✅ ¡Hola, ${data.usuario.nombre}! Redirigiendo…`, 'success');
      setTimeout(() => window.location.href = 'index.html', 1200);
    } else {
      showMsg('msg-login', data.error || 'Error al iniciar sesión.', 'danger');
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Entrar';
    }
  }

  async function hacerRegistro() {
    const nombre          = document.getElementById('reg-nombre').value.trim();
    const email           = document.getElementById('reg-email').value.trim();
    const password        = document.getElementById('reg-password').value;
    const confirmPassword = document.getElementById('reg-confirm').value;
    if (!nombre || !email || !password || !confirmPassword) {
      showMsg('msg-registro','Por favor completa todos los campos.','danger'); return;
    }

    const btn = document.getElementById('btn-registro');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registrando…';

    const { ok, data } = await registro(nombre, email, password, confirmPassword);
    if (ok) {
      showMsg('msg-registro', `🎉 ¡Cuenta creada! Bienvenid@, ${data.usuario.nombre}!`, 'success');
      setTimeout(() => window.location.href = 'index.html', 1200);
    } else {
      showMsg('msg-registro', data.error || 'Error al registrarse.', 'danger');
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-person-check"></i> Registrarme';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('panel-login').classList.contains('active')) hacerLogin();
    else hacerRegistro();
  });
</script>
</body>
</html>
